name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  application:
    name: Test, lint, and build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build

  database:
    name: Reset, test, and lint database
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: npm run db:start

      - name: Reset database from migrations and seeds
        run: npm run db:reset

      - name: Run pgTAP tests
        shell: bash
        run: |
          for delay in 0 15 30 60; do
            sleep "$delay"
            if npm run db:test; then
              exit 0
            fi
            echo "pgTAP runner pull failed; retrying after registry backoff"
          done
          exit 1

      - name: Lint database
        run: npm run db:lint

      - name: Stop local Supabase
        if: always()
        run: npm run db:stop
